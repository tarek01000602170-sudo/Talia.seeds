<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b1f3a" />
<title>نظام إدارة المبيعات</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
  :root {
    --navy-900:#0b1f3a; --navy-800:#0f2a4f; --navy-700:#14376a;
    --navy-600:#1d4d8f; --navy-500:#2563b0; --navy-100:#e6efff;
    --navy-50:#f4f8ff; --bg:#f5f7fb; --card:#fff;
    --text:#0b1f3a; --muted:#5b6b85; --border:#e3e8f1;
    --success:#16a34a; --warning:#d97706; --danger:#dc2626;
    --shadow:0 1px 3px rgba(11,31,58,.06),0 4px 12px rgba(11,31,58,.04);
    --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Cairo','Inter',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
  body.lang-en{font-family:'Inter',sans-serif}
  button{font-family:inherit;cursor:pointer;border:none;background:transparent;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--navy-700);text-decoration:none}

  .app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
  body.no-sidebar .app{grid-template-columns:1fr}
  body.no-sidebar .sidebar{display:none}

  .sidebar{background:var(--navy-900);color:#fff;padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
  .sidebar .brand{padding:0 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
  .sidebar .brand h1{font-size:16px;font-weight:700}
  .sidebar .brand p{font-size:11.5px;opacity:.65;margin-top:4px}
  .sidebar nav{display:flex;flex-direction:column;gap:2px;padding:0 10px}
  .sidebar nav button{color:#cfd9ea;padding:10px 14px;border-radius:8px;text-align:start;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;width:100%}
  .sidebar nav button:hover{background:rgba(255,255,255,.06);color:#fff}
  .sidebar nav button.active{background:var(--navy-600);color:#fff}
  .sidebar nav .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6}
  .sidebar .user-box{padding:14px 16px;margin:14px 10px 0;border-top:1px solid rgba(255,255,255,.08);color:#cfd9ea;font-size:12.5px}
  .sidebar .user-box strong{display:block;color:#fff;font-size:13px;margin-bottom:4px}
  .sidebar .user-box .role-badge{display:inline-block;background:var(--navy-600);color:#fff;padding:2px 8px;border-radius:99px;font-size:10.5px;margin-top:4px}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
  .topbar-brand{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--navy-800)}
  .topbar-actions{display:flex;gap:8px;align-items:center}
  .topbar .lang-toggle{padding:6px 14px;border-radius:8px;background:var(--navy-50);color:var(--navy-700);font-weight:700;font-size:12.5px;border:1px solid var(--navy-100)}
  .topbar .lang-toggle:hover{background:var(--navy-100)}

  .main-wrap{display:flex;flex-direction:column;min-height:100vh}
  .main{padding:24px 28px;flex:1;max-width:100%;overflow-x:hidden}

  .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px}
  .page-header h2{font-size:22px;font-weight:700}
  .page-header p{color:var(--muted);font-size:13px;margin-top:2px}
  .page-header .btn-row{display:flex;gap:8px;flex-wrap:wrap}

  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border)}
  .card-pad{padding:16px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
  .stat{padding:16px 18px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border)}
  .stat .label{font-size:12.5px;color:var(--muted);margin-bottom:6px}
  .stat .value{font-size:22px;font-weight:700;color:var(--navy-800)}
  .stat .sub{font-size:11.5px;color:var(--muted);margin-top:4px}

  .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px;margin-bottom:18px}

  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  thead th{background:var(--navy-50);color:var(--navy-800);font-size:12.5px;font-weight:600;text-align:start;padding:11px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
  tbody td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--navy-50)}

  .btn{padding:9px 16px;border-radius:8px;font-weight:600;font-size:13.5px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--navy-700);color:#fff}
  .btn-primary:hover{background:var(--navy-800)}
  .btn-outline{background:transparent;color:var(--navy-700);border:1px solid var(--navy-700)}
  .btn-outline:hover{background:var(--navy-50)}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-danger:hover{background:#b91c1c}
  .btn-success{background:var(--success);color:#fff}
  .btn-warning{background:var(--warning);color:#fff}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-link{background:transparent;color:var(--navy-700);text-decoration:underline;padding:0;font-size:13px}

  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;cursor:default}
  .badge.clickable{cursor:pointer}
  .badge-success{background:#dcfce7;color:#166534}
  .badge-warning{background:#fef3c7;color:#92400e}
  .badge-info{background:var(--navy-100);color:var(--navy-700)}
  .badge-danger{background:#fee2e2;color:#991b1b}
  .badge-neutral{background:#f1f5f9;color:#475569}

  .form-grid{display:grid;gap:12px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--navy-800);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;transition:border .15s}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--navy-600);box-shadow:0 0 0 3px var(--navy-100)}
  .field .hint{font-size:11px;color:var(--muted);margin-top:4px}

  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .filter-bar input,.filter-bar select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;min-width:150px}

  .modal-bg{position:fixed;inset:0;background:rgba(11,31,58,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:var(--radius);padding:22px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal.lg{max-width:820px}
  .modal h3{font-size:17px;margin-bottom:14px}
  .modal-actions{display:flex;gap:10px;margin-top:16px}

  .img-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .img-row .thumb{position:relative;width:64px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--navy-50)}
  .img-row .thumb img{width:100%;height:100%;object-fit:cover}
  .img-row .thumb button{position:absolute;top:2px;inset-inline-end:2px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;font-size:12px;line-height:1}

  /* Storefront */
  .store-hero{background:linear-gradient(135deg,var(--navy-800),var(--navy-600));color:#fff;padding:32px 24px;border-radius:var(--radius);margin-bottom:22px}
  .store-hero h2{font-size:24px;margin-bottom:6px}
  .store-hero p{opacity:.85;font-size:14px}
  .cat-bar{display:flex;gap:8px;overflow-x:auto;padding:10px 0;margin-bottom:14px;-webkit-overflow-scrolling:touch}
  .cat-pill{padding:8px 18px;border-radius:99px;background:#fff;border:1px solid var(--border);color:var(--navy-700);font-weight:600;font-size:13px;white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .cat-pill.active{background:var(--navy-700);color:#fff;border-color:var(--navy-700)}
  .cat-count{background:var(--navy-700);color:#fff;border-radius:99px;padding:1px 7px;font-size:10.5px;font-weight:700}
  .cat-pill.active .cat-count{background:#fff;color:var(--navy-700)}
  .store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .product-card{background:#fff;border-radius:var(--radius);padding:14px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column}
  .product-card .gallery{position:relative;width:100%;aspect-ratio:4/3;background:var(--navy-50);border-radius:8px;overflow:hidden;margin-bottom:10px;display:flex;align-items:center;justify-content:center}
  .product-card .gallery img{width:100%;height:100%;object-fit:cover}
  .product-card .gallery .placeholder{color:var(--navy-600);font-size:12px;opacity:.6}
  .product-card .gallery .nav{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:rgba(11,31,58,.65);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center}
  body[dir="rtl"] .product-card .gallery .nav.prev{right:8px}
  body[dir="rtl"] .product-card .gallery .nav.next{left:8px}
  body[dir="ltr"] .product-card .gallery .nav.prev{left:8px}
  body[dir="ltr"] .product-card .gallery .nav.next{right:8px}
  .product-card .gallery .dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
  .product-card .gallery .dots span{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.5)}
  .product-card .gallery .dots span.active{background:#fff;width:14px;border-radius:3px}
  .product-card .name{font-weight:700;font-size:14.5px;margin-bottom:4px;color:var(--navy-800)}
  .product-card .desc{font-size:12.5px;color:var(--muted);margin-bottom:8px;min-height:32px}
  .product-card .price{font-size:17px;font-weight:700;color:var(--navy-700);margin-bottom:6px}
  .product-card .stock{font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .qty-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .qty-row .label{font-size:12.5px;color:var(--muted)}
  .product-card .add-btn{margin-top:auto}

  .cart-panel{position:fixed;top:0;height:100vh;width:360px;max-width:100%;background:#fff;box-shadow:0 0 30px rgba(0,0,0,.15);padding:20px;transition:transform .25s;z-index:90;overflow-y:auto}
  body[dir="rtl"] .cart-panel{left:0;transform:translateX(-100%)}
  body[dir="rtl"] .cart-panel.open{transform:translateX(0)}
  body[dir="ltr"] .cart-panel{right:0;transform:translateX(100%)}
  body[dir="ltr"] .cart-panel.open{transform:translateX(0)}
  .cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
  .cart-item img{width:46px;height:46px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--navy-50)}
  .cart-total{font-size:16px;font-weight:700;margin:14px 0;padding-top:12px;border-top:2px solid var(--navy-100)}

  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty h3{font-size:15px;color:var(--navy-800);margin-bottom:6px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy-900);color:#fff;padding:11px 22px;border-radius:8px;font-size:13.5px;z-index:200;opacity:0;transition:opacity .2s,bottom .2s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1;bottom:32px}

  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--navy-800),var(--navy-600))}
  .login-card{background:#fff;padding:32px 28px;border-radius:14px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .login-card h2{text-align:center;margin-bottom:6px;color:var(--navy-800)}
  .login-card p.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:22px}
  .login-card .field{margin-bottom:12px}

  .loader{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:300}
  .loader.hidden{display:none}
  .spinner{width:40px;height:40px;border:3px solid var(--navy-100);border-top-color:var(--navy-700);border-radius:50%;animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .product-thumb-cell{display:flex;align-items:center;gap:8px}
  .product-thumb-cell img{width:36px;height:36px;object-fit:cover;border-radius:6px;background:var(--navy-50)}

  .chart-card{padding:16px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
  .chart-card h4{font-size:14.5px;color:var(--navy-800);margin-bottom:12px}
  .chart-wrap{position:relative;height:240px}

  /* Mobile seller page */
  .ms-cat-bar{display:flex;gap:8px;overflow-x:auto;padding:8px 0;margin-bottom:10px}
  .ms-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .ms-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative}
  .ms-card .img-area{aspect-ratio:1/1;background:var(--navy-50);position:relative;cursor:pointer}
  .ms-card .img-area img{width:100%;height:100%;object-fit:cover}
  .ms-card .img-area .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--navy-600);font-size:11px;opacity:.5}
  .ms-card .qty-badge{position:absolute;top:6px;inset-inline-end:6px;background:var(--navy-700);color:#fff;border-radius:99px;padding:3px 9px;font-size:12px;font-weight:700;min-width:22px;text-align:center}
  .ms-card .nm{padding:6px 8px;font-size:12px;font-weight:600;color:var(--navy-800);text-align:center;background:var(--navy-50);cursor:pointer;border-top:1px solid var(--border)}
  .ms-card .pr{font-size:11px;color:var(--muted);text-align:center;padding:0 8px 6px}
  .ms-fab{position:fixed;bottom:18px;inset-inline-end:18px;background:var(--navy-700);color:#fff;border-radius:99px;padding:12px 18px;font-weight:700;box-shadow:0 6px 20px rgba(11,31,58,.3);z-index:80;display:flex;align-items:center;gap:8px;font-size:14px}

  /* Dark Mode */
  body.dark-mode{--navy-50:#1a2744;--navy-100:#1e3158;--navy-600:#5b8ef0;--navy-700:#7aa8ff;--navy-800:#c8d8f8;--navy-900:#e0ecff;--border:#2a3f66;--muted:#8fa8d4;background:#0f1e38;color:#c8d8f8}
  body.dark-mode .card,body.dark-mode .chart-card,body.dark-mode .modal,body.dark-mode .product-card,body.dark-mode .cart-panel{background:#162040;border-color:#2a3f66}
  body.dark-mode table th{background:#1a2744;color:#8fa8d4}
  body.dark-mode tbody tr:hover{background:#1a2744}
  body.dark-mode .field input,body.dark-mode .field select,body.dark-mode .field textarea,body.dark-mode .filter-bar input,body.dark-mode .filter-bar select{background:#1a2744;border-color:#2a3f66;color:#c8d8f8}
  body.dark-mode .badge-neutral{background:#1a2744;color:#8fa8d4}
  body.dark-mode .login-screen{background:linear-gradient(135deg,#0b1930,#0f1e38)}
  body.dark-mode .login-card{background:#162040;color:#c8d8f8}
  body.dark-mode .btn-outline{color:#7aa8ff;border-color:#7aa8ff}
  body.dark-mode .stat,body.dark-mode .ms-card{background:#162040;border-color:#2a3f66}
  .dark-toggle{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;transition:all .15s}
  .dark-toggle:hover{background:var(--navy-50)}

  /* POS page */
  .pos-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;min-height:70vh}
  @media(max-width:900px){.pos-grid{grid-template-columns:1fr}}
  .pos-products{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;max-height:75vh;overflow-y:auto;padding-right:6px}
  .pos-card{background:#fff;border:2px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .15s;text-align:center}
  .pos-card:hover{border-color:var(--navy-600);box-shadow:0 4px 16px rgba(20,55,106,.15)}
  .pos-card.has-qty{border-color:var(--navy-700);background:var(--navy-50)}
  .pos-card .img{aspect-ratio:1/1;background:var(--navy-50);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .pos-card .img img{width:100%;height:100%;object-fit:cover}
  .pos-card .qty-badge{position:absolute;top:5px;inset-inline-end:5px;background:var(--navy-700);color:#fff;border-radius:99px;padding:3px 8px;font-size:13px;font-weight:700}
  .pos-card .nm{padding:7px 6px 3px;font-size:12.5px;font-weight:600;color:var(--navy-800)}
  .pos-card .pr{font-size:11.5px;color:var(--muted);padding-bottom:6px}
  .pos-cart{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;max-height:80vh}
  .pos-cart h3{font-size:16px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:10px}
  .pos-items{flex:1;overflow-y:auto;margin-bottom:10px}
  .pos-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:8px;font-size:13px}
  .pos-item .controls{display:inline-flex;align-items:center;gap:2px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .pos-item .controls button{width:24px;height:24px;background:var(--navy-50);font-size:14px}
  .pos-summary{background:var(--navy-50);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:13.5px}
  .pos-summary .total{font-size:18px;font-weight:700;color:var(--navy-800);margin-top:6px}

  /* Analytics page */
  .analytics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}

  /* Seller store banner */
  .seller-store-banner{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--navy-700),var(--navy-500));color:#fff;padding:18px 22px;border-radius:var(--radius);margin-bottom:18px}
  .seller-store-banner .s-logo{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0}
  .seller-store-banner h3{font-size:18px;margin-bottom:2px}
  .seller-store-banner p{font-size:12.5px;opacity:.85}

  /* Store customer chat FAB */
  .store-chat-fab{position:fixed;bottom:28px;left:28px;z-index:900;background:var(--navy-700);color:#fff;border:none;border-radius:99px;padding:12px 18px;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(20,55,106,.35);font-family:inherit;font-size:13.5px;font-weight:600;transition:transform .15s,box-shadow .15s}
  .store-chat-fab:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(20,55,106,.45)}
  .chat-fab-label{display:inline}
  @media(max-width:640px){.chat-fab-label{display:none}}

  /* Store chat widget */
  .store-chat-widget{position:fixed;bottom:90px;left:28px;z-index:901;width:320px;max-height:460px;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border)}
  .store-chat-widget.hidden{display:none}
  .scw-header{background:var(--navy-700);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}

// ============ FIRESTORE LISTENERS ============
function startListeners(){
  stopListeners();
  const cols = ['products','customers','sellers','categories','governorates','shippingPrices','shippingCompanies','sales','invoices','shipments','coupons','warehouses','suppliers','expenses','chatRooms'];
  cols.forEach(name => {
    const unsub = onSnapshot(collection(db, name), snap => {
      data[name] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      data[name].sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      render();
    }, err => console.warn(`listener ${name}:`, err.message));
    unsubs.push(unsub);
  });
  // activity log - only last 50 items
  try {
    const q = query(collection(db, 'activityLog'), orderBy('timestamp','desc'), fbLimit(50));
    const u = onSnapshot(q, snap => {
      data.activityLog = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    }, err => console.warn('activityLog:', err.message));
    unsubs.push(u);
  } catch(e){}
}
function stopListeners(){
  unsubs.forEach(u => { try{ u(); }catch(e){} });
  unsubs = [];
}

(function detectSellerStore(){
  const path = window.location.pathname;
  const m = path.match(/\/store\/([a-z0-9_-]+)/i);
  if (!m) return;
  const slug = m[1].toLowerCase();
  // We'll resolve the actual seller after data loads; save slug for now
  window._pendingStoreSlug = slug;
})();

function resolveStoreSlug(){
  if (!window._pendingStoreSlug) return;
  const slug = window._pendingStoreSlug;
  const sl = data.sellers.find(s => (s.storeSlug||'').toLowerCase() === slug);
  if (sl && storeSellerOverride !== sl.id){
    storeSellerOverride = sl.id;
    currentSellerData = sl;
    render();
  }
}

function startPublicListener(){
  stopListeners();
  ['products', 'categories', 'sellers'].forEach(name => {
    const unsub = onSnapshot(collection(db, name), snap => {
      data[name] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      data[name].sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      resolveStoreSlug();
      render();
    }, err => { console.warn('public:', err.message); render(); });
    unsubs.push(unsub);
  });
}

function pagesForRole(){
  if (currentRole === 'packaging') return packagingPages;
  if (currentRole === 'seller'){
    // use seller's customized allowedPages if set
    const sl = data.sellers.find(x => x.id === currentSellerId);
    const allowed = sl?.allowedPages;
    if (allowed && allowed.length){
      const base = [{ id:'sellerHub', key:'sellerHub' }];
      adminPages.forEach(p => { if (allowed.includes(p.id) && p.id !== 'sellerHub') base.push(p); });
      return base;
    }
    return sellerPages;
  }
  return adminPages;
}

  document.getElementById('nav').innerHTML = pagesForRole().map(p => `

function render(){
  // destroy previous chart instances
  Object.values(chartInstances).forEach(c => { try{ c.destroy(); }catch(e){} });
  chartInstances = {};

  const main = document.getElementById('main');
  const fn = {
    dashboard: renderDashboard, products: renderProducts, customers: renderCustomers,
    sellers: renderSellers, sales: renderSales, invoices: renderInvoices,
    shipping: renderShipping, store: renderStore, inventory: renderInventory,
    whatsapp: renderWhatsApp, packaging: renderPackaging, mobileSeller: renderMobileSeller,
    pos: renderPOS, analytics: renderAnalytics, commissions: renderCommissions,
    coupons: renderCoupons, warehouses: renderWarehouses, suppliers: renderSuppliers,
    expenses: renderExpenses, finance: renderFinance, chat: renderChat,
    barcodes: renderBarcodes, sellerHub: renderSellerHub,
  }[currentPage];
  if (!fn){ main.innerHTML = ''; return; }
  if (currentPage !== 'store' && !currentUser){ currentPage = 'store'; main.innerHTML = renderStore(); return; }
  // role guard
  const allowed = pagesForRole().some(p => p.id === currentPage);
  if (currentUser && !allowed && currentPage !== 'store'){
    currentPage = pagesForRole()[0].id;
    main.innerHTML = ''; render(); return;
  }
  main.innerHTML = fn();
  document.querySelectorAll('[data-t]').forEach(el => { el.textContent = t(el.dataset.t); });

  // Post-render: charts
  if (currentPage === 'dashboard') setTimeout(buildDashboardCharts, 50);
  if (currentPage === 'analytics') setTimeout(buildAnalyticsCharts, 100);
}

function buildDashboardCharts(){
  if (typeof Chart === 'undefined') return;
  // Sales trend - last 14 days
  const days = [];
  for (let i = 13; i >= 0; i--){
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0,10));
  }
  const dayTotals = days.map(d => data.sales.filter(s => s.date === d).reduce((a, s) => a + (s.total||0), 0));
  const c1 = document.getElementById('chartSales');
  if (c1){
    chartInstances.sales = new Chart(c1.getContext('2d'), {
      type: 'line',
      data: {
        labels: days.map(d => d.slice(5)),
        datasets: [{
          label: t('totalSales'), data: dayTotals,
          borderColor: '#14376a', backgroundColor: 'rgba(20,55,106,.1)',
          fill: true, tension: .35, pointRadius: 3,
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }
  // Top products
  const productTotals = {};
  data.sales.forEach(s => (s.items || []).forEach(it => {
    productTotals[it.productId] = (productTotals[it.productId] || 0) + it.qty;
  }));
  const top = Object.entries(productTotals).map(([id, qty]) => {
    const p = data.products.find(x => x.id === id);
    return { name: p?.name || '-', qty };
  }).sort((a, b) => b.qty - a.qty).slice(0, 6);
  const c2 = document.getElementById('chartProducts');
  if (c2){
    chartInstances.products = new Chart(c2.getContext('2d'), {
      type: 'bar',
      data: {
        labels: top.map(x => x.name),
        datasets: [{ label: t('qty'), data: top.map(x => x.qty), backgroundColor: '#1d4d8f' }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, indexAxis: 'y' }
    });
  }
}

window.uploadGlobalBarcode = async function(e){
  const file = e.target.files[0]; if (!file) return;
  if (!file.type.startsWith('image/')){ toast(t('invalidImage')); return; }
  try{
    toast(t('loading'));
    const storageRef = sRef(storage, `settings/global_barcode_${Date.now()}`);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);
    await setDoc(doc(db, 'settings', 'global'), { barcodeUrl: url }, { merge: true });
    globalBarcodeUrl = url;
    toast('تم رفع الباركود');
    openPrintStickersModal();
  }catch(err){ toast('Error: '+err.message); }
};
window.clearGlobalBarcode = async function(){

  }).join('');
  const barcodeScripts = products.filter((_,i) => !globalBarcodeUrl).map((p, i) =>
    `try{ JsBarcode("#bc${i}", ${JSON.stringify(p.code || p.id.slice(0,8))}, {height:28,fontSize:9,margin:1,displayValue:true}); }catch(e){}`

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></`+`script>

      body{font-family:'Cairo',sans-serif;background:#fff;padding:10px}
      .grid{display:flex;flex-wrap:wrap;gap:6px}
      .stk{border:1px dashed #aaa;padding:5px;text-align:center;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;page-break-inside:avoid;break-inside:avoid;overflow:hidden}
      .stk-name{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:2px}
      .stk-sub{font-size:9px;color:#555;margin-bottom:3px}
      .stk-bc-img{max-width:90%;max-height:40%;object-fit:contain}
      .stk-bc-svg{max-width:100%;height:auto}
      @media print{body{padding:0}.no-print{display:none}}
    </style>
    </head><body>
    <div class="no-print" style="margin-bottom:12px;font-family:Cairo,sans-serif">
      <button onclick="window.print()" style="padding:8px 18px;background:#0f2a4f;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:Cairo,sans-serif;font-size:14px;">🖨 طباعة</button>
    </div>
    <div class="grid">${stickersHtml}</div>
    <script>window.onload=()=>{${barcodeScripts}${!globalBarcodeUrl?'setTimeout(()=>window.print(),400)':'setTimeout(()=>window.print(),800)'}};</`+`script>
    </body></html>`);
  win.document.close();
};

window.addImageFiles = async function(e){

    if (file.size > 2*1024*1024){ toast(t('imageTooBig')+': '+file.name); continue; }
    try{

      const path = `products/${Date.now()}_${file.name}`;
      const ref = sRef(storage, path);
      await uploadBytes(ref, file);
      const url = await getDownloadURL(ref);
      editingImages.push(url); refreshImagePreview();
    }catch(err){ toast(t('uploadFailed')+': '+err.message); }

// Excel column definitions - single source of truth
const PROD_COLS = [
  { key:'كود المنتج',    field:'code' },
  { key:'اسم المنتج',    field:'name' },
  { key:'الوصف المختصر', field:'shortDesc' },
  { key:'التصنيف',       field:'_category' },
  { key:'التكلفة',       field:'cost' },
  { key:'سعر المنتج',    field:'price' },
  { key:'عمولة المنتج %',field:'commission' },
  { key:'ربح البائع',    field:'profit' },
  { key:'وزن المنتج كجم',field:'weight' },
  { key:'الحالة',        field:'_available' },
  { key:'المخزون',       field:'stock' },
  { key:'صورة المنتج',   field:'_image' },
];

window.downloadProductTemplate = function(){
  // One empty example row
  const exampleRow = {
    'كود المنتج':'P001','اسم المنتج':'اسم المنتج هنا','الوصف المختصر':'وصف مختصر',
    'التصنيف':'إلكترونيات','التكلفة':100,'سعر المنتج':150,
    'عمولة المنتج %':5,'ربح البائع':20,'وزن المنتج كجم':0.5,
    'الحالة':'متوفر','المخزون':50,'صورة المنتج':'',
  };
  const ws = XLSX.utils.json_to_sheet([exampleRow], { header: PROD_COLS.map(c=>c.key) });
  // Style header row width hints
  ws['!cols'] = PROD_COLS.map(() => ({ wch: 18 }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'منتجات');
  XLSX.writeFile(wb, 'قالب_المنتجات.xlsx');
};

window.importProductsExcel = async function(e){
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try{
      const wb = XLSX.read(ev.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
      let count = 0;
      for (const row of rows){
        const name = String(row['اسم المنتج'] || row.name || '').trim();
        if (!name) continue;
        // resolve category
        const catName = String(row['التصنيف'] || row.category || '').trim();
        let categoryId = '';
        if (catName){
          const ex = data.categories.find(c => c.name === catName);
          if (ex) categoryId = ex.id;
          else { const r = await addDoc(collection(db, 'categories'), { name: catName, createdAt: Date.now() }); categoryId = r.id; }
        }
        const available = String(row['الحالة'] || '').includes('متوفر') || String(row['الحالة'] || '').toLowerCase().includes('avail');
        await addDoc(collection(db, 'products'), {
          name,
          shortDesc:  String(row['الوصف المختصر'] || ''),
          code:       String(row['كود المنتج'] || row.code || ''),
          cost:       parseFloat(row['التكلفة'])       || 0,
          price:      parseFloat(row['سعر المنتج'])    || 0,
          commission: parseFloat(row['عمولة المنتج %'])|| 0,
          profit:     parseFloat(row['ربح البائع'])    || 0,
          weight:     parseFloat(row['وزن المنتج كجم'])|| 0,
          stock:      parseInt(row['المخزون'])          || 0,
          desc: '', stickerSize:'', images: String(row['صورة المنتج']||'') ? [String(row['صورة المنتج'])] : [],
          categoryId, createdAt: Date.now(),
        });
        count++;
      }
      toast(`${t('importSuccess')}: ${count}`);
    }catch(err){ toast('خطأ في الاستيراد: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
};

window.exportProductsExcel = function(){
  const rows = data.products.map(p => ({
    'كود المنتج':     p.code || p.id.slice(0,5),
    'اسم المنتج':     p.name,
    'الوصف المختصر':  p.shortDesc || '',
    'التصنيف':        data.categories.find(c=>c.id===p.categoryId)?.name || '',
    'التكلفة':        p.cost || 0,
    'سعر المنتج':     p.price,
    'عمولة المنتج %': p.commission || 0,
    'ربح البائع':     p.profit || 0,
    'وزن المنتج كجم': p.weight || 0,
    'الحالة':         (p.stock||0) > 0 ? 'متوفر' : 'غير متوفر',
    'المخزون':        p.stock || 0,
    'صورة المنتج':    p.images?.[0] || '',
  }));

window.importCustomersExcel = async function(e){
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try{
      const wb = XLSX.read(ev.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      let count = 0;
      for (const row of rows){
        const name = row.name || row['الإسم'] || row['الاسم'];
        const phone = String(row.phone || row['تليفون 1'] || row['تليفون'] || '');
        if (!name || !phone) continue;
        await addDoc(collection(db, 'customers'), {
          name, phone, phone2: String(row.phone2 || row['تليفون 2'] || ''),
          governorate: row.governorate || row['المحافظة'] || '',
          address: row.address || row['العنوان'] || '',
          code: String(row.code || row['كود العميل'] || ''),
          status: row.status || row['حالة العميل'] || '',
          createdAt: Date.now(),
        });
        count++;
      }
      toast(`${t('importSuccess')}: ${count}`);
    }catch(err){ toast('Error: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
};
window.exportCustomersExcel = function(){

  XLSX.utils.book_append_sheet(wb, ws, 'Customers');
  XLSX.writeFile(wb, 'customers.xlsx');
};

window.saveSeller = async function(e, id){
  e.preventDefault();
  const f = new FormData(e.target);
  const allowedPages = Array.from(e.target.querySelectorAll('[name="allowedPage"]:checked')).map(el=>el.value);
  const rawSlug = (f.get('storeSlug')||'').toLowerCase().replace(/[^a-z0-9-]/g,'').trim();
  const obj = {
    name: f.get('name'), phone: f.get('phone'),
    commission: parseFloat(f.get('commission')),
    allowedPages, chatPermission: f.get('chatPermission')||'none',
    storeSlug: rawSlug || null,
    updatedAt: Date.now(),
  };
  try{
    let sellerId = id;
    if (id) await updateDoc(doc(db, 'sellers', id), obj);
    else { const ref = await addDoc(collection(db, 'sellers'), { ...obj, createdAt: Date.now() }); sellerId = ref.id; }
    // Optionally create login user
    if (f.get('createLogin') && f.get('email') && f.get('password')){
      try{
        const cred = await createUserWithEmailAndPassword(authSec, f.get('email'), f.get('password'));
        await setDoc(doc(db, 'users', cred.user.uid), {
          role: 'seller', sellerId, name: obj.name, email: f.get('email'),
          allowedPages, chatPermission: obj.chatPermission, createdAt: Date.now(),
        });
        await updateDoc(doc(db, 'sellers', sellerId), { loginEmail: f.get('email'), loginUid: cred.user.uid });
        await signOut(authSec);
      }catch(err){ toast('Login err: '+err.message); }
    }
    logActivity(id?'edit':'new', { entity: 'seller', name: obj.name });
    toast(t('saved')); closeModal();
  }catch(err){ toast('Error: '+err.message); }
};

  const product = data.products.find(p => p.id === pid); if (!product) return;
  const existing = saleItems.find(i => i.productId === pid);
  const newQty = (existing?.qty || 0) + qty;
  if (newQty > (product.stock||0)){ alert(t('qtyExceeds')); return; }
  if (existing) existing.qty = newQty;
  else saleItems.push({ productId: pid, qty, price: product.price });
  refreshSaleItems();
};
window.removeSaleItem = function(i){ saleItems.splice(i,1); refreshSaleItems(); };
window.saveSale = async function(e){
  e.preventDefault();
  if (!saleItems.length){ alert(t('addItem')); return; }
  const f = new FormData(e.target);
  const total = saleItems.reduce((s,i)=>s+i.price*i.qty,0);
  const today = new Date().toISOString().slice(0, 10);
  try{
    const saleRef = await addDoc(collection(db, 'sales'), {
      customerId: f.get('customerId'), sellerId: f.get('sellerId'),
      items: saleItems.map(i => ({...i})), total, date: today,
      status: f.get('status'), createdAt: Date.now(),
    });
    for (const it of saleItems){
      const p = data.products.find(x => x.id === it.productId);
      await updateDoc(doc(db, 'products', it.productId), { stock: (p.stock||0) - it.qty });
    }
    await addDoc(collection(db, 'invoices'), {
      saleId: saleRef.id, status: lang === 'ar' ? 'غير مدفوعة' : 'unpaid',
      date: today, createdAt: Date.now(),
    });
    logActivity('new', { entity: 'sale', name: '#'+saleRef.id.slice(0,5) });
    toast(t('saved')); closeModal();
  }catch(err){ toast('Error: '+err.message); }
};
window.deleteSale = async function(id){
  if (!confirm(t('deleteSaleConfirm'))) return;
  try{
    const batch = writeBatch(db);
    batch.delete(doc(db, 'sales', id));
    data.invoices.filter(i => i.saleId === id).forEach(i => batch.delete(doc(db, 'invoices', i.id)));
    data.shipments.filter(sh => sh.saleId === id).forEach(sh => batch.delete(doc(db, 'shipments', sh.id)));
    await batch.commit();
    logActivity('delete', { entity: 'sale', name: '#'+id.slice(0,5) });
    toast(t('deleted'));
  }catch(err){ toast('Error: '+err.message); }
};

function calculateShipping(governorate, deliveryType, weight){
  const match = data.shippingPrices.find(p =>
    p.governorate === governorate && p.deliveryType === deliveryType &&
    weight >= p.weightFrom && weight <= p.weightTo);
  return match?.price || 0;
}

window.sendWA = function(phone){
  const msg = document.getElementById('waMsg')?.value || '';
  // normalize: drop leading 0, ensure country code 20 for EG
  let p = String(phone).replace(/\D/g, '');
  if (p.startsWith('0')) p = '20' + p.slice(1);
  if (!p.startsWith('20')) p = '20' + p;
  const url = `https://wa.me/${p}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');

window.msSubmitOrder = async function(){
  const phone = document.getElementById('msPhone').value.trim();
  const name = document.getElementById('msName')?.value.trim();
  if (!phone || !name){ alert(t('enterPhone')); return; }
  const customerId = document.getElementById('msCustomerId')?.value;
  const gov = document.getElementById('msGov')?.value || '';
  const addr = document.getElementById('msAddr')?.value || '';
  try{
    let cid = customerId;
    if (!cid){
      const ref = await addDoc(collection(db, 'customers'), { name, phone, governorate: gov, address: addr, createdAt: Date.now() });
      cid = ref.id;
    } else {
      // update
      await updateDoc(doc(db, 'customers', cid), { name, governorate: gov, address: addr, updatedAt: Date.now() });
    }
    const items = Object.entries(data.msCart).map(([pid, qty]) => {
      const p = data.products.find(x => x.id === pid);
      return { productId: pid, qty, price: p?.price || 0 };
    });
    const total = items.reduce((a,i)=>a+i.price*i.qty,0);
    const today = new Date().toISOString().slice(0, 10);
    const saleRef = await addDoc(collection(db, 'sales'), {
      customerId: cid, sellerId: currentSellerId || data.sellers[0]?.id || null,
      items, total, date: today, status: lang==='ar'?'قيد المعالجة':'processing', createdAt: Date.now(),
    });
    for (const it of items){
      const p = data.products.find(x => x.id === it.productId);
      await updateDoc(doc(db, 'products', it.productId), { stock: (p.stock||0) - it.qty });
    }
    await addDoc(collection(db, 'invoices'), { saleId: saleRef.id, status: lang==='ar'?'غير مدفوعة':'unpaid', date: today, createdAt: Date.now() });
    data.msCart = {};
    closeModal(); toast(t('orderSuccess'));
    logActivity('new', { entity: 'sale', name: '#'+saleRef.id.slice(0,5) });
  }catch(err){ toast('Error: '+err.message); }
};

window.cycleImage = function(productId, dir){
  const p = data.products.find(x => x.id === productId);
  if (!p || !p.images || p.images.length < 2) return;
  const cur = data.galleryIndex[productId] || 0;
  data.galleryIndex[productId] = (cur + dir + p.images.length) % p.images.length;
  render();
};
window.addToCartWithQty = function(productId, qtyId){
  const inp = document.getElementById(qtyId);
  const qty = Math.max(1, parseInt(inp?.value) || 1);
  const product = data.products.find(p => p.id === productId);
  if (!product) return;
  const existing = data.cart.find(x => x.productId === productId);
  const newTotal = (existing ? existing.qty : 0) + qty;
  if (newTotal > (product.stock || 0)){ alert(`${t('maxAvailable')} ${product.stock||0}`); return; }
  if (existing) existing.qty = newTotal;
  else data.cart.push({ productId, qty });
  saveCart();
  toast(`${t('addedToCart')} ${qty}`);
  render();
};

// ============ CART ============
window.openCart = function(){ document.getElementById('cartPanel').classList.add('open'); renderCart(); };
window.closeCart = function(){ document.getElementById('cartPanel').classList.remove('open'); };
window.changeCartQty = function(productId, delta){
  const item = data.cart.find(x => x.productId === productId);
  if (!item) return;
  const product = data.products.find(p => p.id === productId);
  const newQty = item.qty + delta;
  if (newQty < 1){ window.removeFromCart(productId); return; }
  if (newQty > (product.stock||0)){ alert(`${t('maxAvailable')} ${product.stock||0}`); return; }
  item.qty = newQty;
  saveCart(); renderCart(); render();
};
window.removeFromCart = function(productId){
  data.cart = data.cart.filter(x => x.productId !== productId);
  saveCart(); renderCart(); render();
};
function renderCart(){
  const panel = document.getElementById('cartPanel');
  const items = data.cart.map(item => {
    const p = data.products.find(x => x.id === item.productId);

  panel.innerHTML = `

              <div style="font-weight:600;font-size:13px;">${item.product?.name || '-'}</div>

              <div style="display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:5px;">

window.checkout = function(){
  if (!data.cart.length) return;
  closeCart();
  showModal(`
    <h3>${t('checkoutBtn')}</h3>
    <form class="form-grid" onsubmit="completeCheckout(event)">
      <div class="field"><label>${t('name')}</label><input name="name" required></div>
      <div class="field"><label>${t('phone')}</label><input name="phone" required></div>
      <div class="field"><label>${t('governorate')}</label><input name="governorate" list="govList3"></div>
      <datalist id="govList3">${data.governorates.map(g=>`<option value="${escapeAttr(g.name)}">`).join('')}</datalist>
      <div class="field"><label>${t('address')}</label><input name="address" required></div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">${t('confirmOrderBtn')}</button>
        <button type="button" class="btn btn-outline" onclick="closeModal()">${t('cancel')}</button>
      </div>
    </form>
  `);
};
window.completeCheckout = async function(e){
  e.preventDefault();
  const f = new FormData(e.target);
  const name = f.get('name'), phone = f.get('phone'), address = f.get('address'), governorate = f.get('governorate');
  try{
    let customer = data.customers.find(c => c.phone === phone);
    if (!customer){
      const ref = await addDoc(collection(db, 'customers'), { name, phone, address, governorate, createdAt: Date.now() });
      customer = { id: ref.id, name, phone, address, governorate };
    }
    const today = new Date().toISOString().slice(0, 10);
    const items = []; let total = 0; const stockUpdates = [];
    for (const item of data.cart){
      const p = data.products.find(x => x.id === item.productId);
      if (!p || (p.stock||0) < item.qty) continue;
      items.push({ productId: p.id, qty: item.qty, price: p.price });
      total += p.price * item.qty;
      stockUpdates.push({ id: p.id, newStock: (p.stock||0) - item.qty });
    }
    if (!items.length){ alert(t('noProductsAvail')); return; }
    const sellerId = storeSellerOverride || data.sellers[0]?.id || null;
    const saleRef = await addDoc(collection(db, 'sales'), {
      customerId: customer.id, sellerId, items, total, date: today,
      status: lang==='ar'?'قيد المعالجة':'processing', createdAt: Date.now(),
      channel: storeSellerOverride ? 'seller-store' : 'store',
    });
    for (const u of stockUpdates) await updateDoc(doc(db, 'products', u.id), { stock: u.newStock });
    await addDoc(collection(db, 'invoices'), { saleId: saleRef.id, status: lang==='ar'?'غير مدفوعة':'unpaid', date: today, createdAt: Date.now() });
    data.cart = []; saveCart(); closeModal();
    toast(t('orderSuccess'));
  }catch(err){ toast('Error: '+err.message); }
};

window.posInc = function(pid){
  const p = data.products.find(x=>x.id===pid);
  const cur = data.posCart[pid]||0;
  if(cur+1>(p?.stock||0)){toast(t('qtyExceeds'));return;}
  data.posCart[pid]=cur+1; render();
};
window.posDec = function(pid){
  const cur = data.posCart[pid]||0;
  if(cur<=1) delete data.posCart[pid]; else data.posCart[pid]=cur-1;
  render();
};
window.posLookup = function(phone){
  const div=document.getElementById('posCustomerInfo'); if(!div)return;
  if(!phone||phone.length<6){div.innerHTML='';return;}
  const c=data.customers.find(x=>x.phone===phone||x.phone2===phone);
  if(c) div.innerHTML=`<div style="background:#dcfce7;color:#166534;padding:8px;border-radius:6px;font-size:12px;margin-top:4px;">✓ ${c.name} — ${c.governorate||''} ${c.address||''}<input id="posCustomerId" type="hidden" value="${c.id}"><input id="posCName" type="hidden" value="${c.name}"><input id="posGov" type="hidden" value="${c.governorate||''}"><input id="posAddr" type="hidden" value="${c.address||''}"></div>`;
  else div.innerHTML=`<div style="background:#fef3c7;color:#92400e;padding:8px;border-radius:6px;font-size:12px;margin-top:4px;">عميل جديد — سيُضاف تلقائياً</div>`;
};
window.posCheckout = async function(){
  const phone=(document.getElementById('posPhone')?.value||'').trim();
  if(!phone){toast('أدخل رقم تليفون العميل');return;}
  const deposit=parseFloat(document.getElementById('posDeposit')?.value)||0;
  const items=Object.entries(data.posCart).map(([pid,qty])=>{
    const p=data.products.find(x=>x.id===pid);
    return {productId:pid,qty,price:p?.price||0};
  });
  if(!items.length){toast('السلة فارغة');return;}
  const total=items.reduce((s,i)=>s+i.price*i.qty,0);
  const today=new Date().toISOString().slice(0,10);
  try{
    let cid=document.getElementById('posCustomerId')?.value;
    if(!cid){
      const ref=await addDoc(collection(db,'customers'),{name:'عميل نقطة البيع',phone,createdAt:Date.now()});
      cid=ref.id;
    }
    const saleRef=await addDoc(collection(db,'sales'),{
      customerId:cid,sellerId:currentSellerId||data.sellers[0]?.id||null,
      items,total,date:today,deposit,remaining:total-deposit,
      status:lang==='ar'?'مكتملة':'completed',createdAt:Date.now(),channel:'pos'
    });
    for(const it of items){
      const p=data.products.find(x=>x.id===it.productId);
      await updateDoc(doc(db,'products',it.productId),{stock:(p.stock||0)-it.qty});
    }
    await addDoc(collection(db,'invoices'),{saleId:saleRef.id,status:deposit>=total?(lang==='ar'?'مدفوعة':'paid'):(lang==='ar'?'غير مدفوعة':'unpaid'),date:today,createdAt:Date.now()});
    data.posCart={};
    logActivity('new',{entity:'sale',name:'POS #'+saleRef.id.slice(0,5)});
    toast(`✅ تم تسجيل البيع — الإجمالي: ${fmtMoney(total)}`);
    render();
  }catch(err){toast('Error: '+err.message);}
};

// ============ COMMISSIONS — العمولات ============
let commTab = 'all'; // 'all' | 'week'
function renderCommissions(){
  const sellers = data.sellers;

  // Weekly date range
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0=Sunday
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - ((dayOfWeek + 1) % 7)); // Saturday start
  weekStart.setHours(0,0,0,0);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);
  weekEnd.setHours(23,59,59,999);
  const weekStartStr = weekStart.toISOString().slice(0,10);
  const weekEndStr = weekEnd.toISOString().slice(0,10);

  const filterSales = (sl) => {
    // Exclude sales where commission has been paid out
    const all = data.sales.filter(s=>s.sellerId===sl.id && !s.commissionPaid);
    if (commTab === 'week') return all.filter(s=>s.date&&s.date>=weekStartStr&&s.date<=weekEndStr);
    return all;
  };

  const allStats = sellers.map(sl=>{
    const sts = filterSales(sl);
    const totalSales = sts.reduce((a,s)=>a+(s.total||0),0);
    // seller profit = sum of (price - cost) * qty
    const profit = sts.reduce((a,s)=>{
      return a+(s.items||[]).reduce((sa,it)=>{
        const p=data.products.find(x=>x.id===it.productId);
        return sa+((p?.price||0)-(p?.cost||0))*it.qty;
      },0);
    },0);
    const commPct = sl.commission||5;
    const commVal = (totalSales*commPct)/100;
    return {sl,count:sts.length,totalSales,profit,commPct,commVal};
  });
  const grandSales=allStats.reduce((a,x)=>a+x.totalSales,0);
  const grandComm=allStats.reduce((a,x)=>a+x.commVal,0);
  const grandProfit=allStats.reduce((a,x)=>a+x.profit,0);

  // Daily breakdown for current week per seller
  const weekDays = [];
  for(let i=0;i<7;i++){
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    weekDays.push(d.toISOString().slice(0,10));
  }

  return `
  <div class="page-header"><div><h2>${t('commissions')}</h2><p style="color:var(--muted);font-size:13px;">احسب وتابع عمولات البائعين</p></div>
    <div class="btn-row">
      <button class="btn ${commTab==='all'?'btn-primary':'btn-outline'} btn-sm" onclick="setCommTab('all')">كل الوقت</button>
      <button class="btn ${commTab==='week'?'btn-primary':'btn-outline'} btn-sm" onclick="setCommTab('week')">هذا الأسبوع</button>
    </div>
  </div>
  ${commTab==='week'?`<div style="background:var(--navy-50);padding:10px 16px;border-radius:8px;margin-bottom:14px;font-size:13px;color:var(--navy-700);">
    📅 الفترة: <strong>${weekStartStr}</strong> — <strong>${weekEndStr}</strong>
  </div>`:''}
  <div class="stats" style="margin-bottom:16px;">
    <div class="stat"><div class="label">إجمالي المبيعات</div><div class="value">${fmtMoney(grandSales)}</div></div>
    <div class="stat"><div class="label">صافي الربح الإجمالي</div><div class="value" style="color:var(--success);">${fmtMoney(grandProfit)}</div></div>
    <div class="stat"><div class="label">إجمالي العمولات المستحقة</div><div class="value" style="color:var(--navy-700);">${fmtMoney(grandComm)}</div></div>
    <div class="stat"><div class="label">عدد البائعين</div><div class="value">${sellers.length}</div></div>
  </div>
  <div class="card table-wrap" style="margin-bottom:16px;">
    <table>
      <thead><tr><th>${t('name')}</th><th>عدد المبيعات</th><th>إجمالي المبيعات</th><th>صافي ربح البائع</th><th>نسبة العمولة %</th><th>قيمة العمولة</th><th></th></tr></thead>
      <tbody>
        ${allStats.map(x=>`<tr>
          <td><strong>${x.sl.name}</strong><div style="font-size:11.5px;color:var(--muted);">${x.sl.phone||''}</div></td>
          <td>${x.count}</td>
          <td>${fmtMoney(x.totalSales)}</td>
          <td><strong style="color:var(--success);">${fmtMoney(x.profit)}</strong></td>
          <td><input type="number" value="${x.commPct}" min="0" max="100" style="width:60px;padding:5px;border:1px solid var(--border);border-radius:6px;text-align:center;" onchange="updateSellerComm('${x.sl.id}',this.value)"> %</td>
          <td><strong style="color:var(--navy-700);font-size:15px;">${fmtMoney(x.commVal)}</strong></td>
          <td>

  await updateDoc(doc(db,'sellers',id),{commission:parseFloat(val)||0});

};
window.markCommissionPaid = async function(sellerId, sellerName, weekStart, weekEnd){
  // Get all unpaid-commission sales for this seller in the period
  const salesToMark = data.sales.filter(s => {
    if(s.sellerId !== sellerId) return false;
    if(s.commissionPaid) return false;
    if(weekStart && weekEnd) return s.date && s.date >= weekStart && s.date <= weekEnd;
    return true;
  });
  if(!salesToMark.length){ toast('لا توجد طلبات مستحقة لهذا البائع'); return; }
  const totalComm = salesToMark.reduce((a,s)=>{
    const sl=data.sellers.find(x=>x.id===sellerId);
    return a+(s.total||0)*(sl?.commission||5)/100;
  },0);
  const period = weekStart ? `(${weekStart} — ${weekEnd})` : '(كل الوقت)';
  if(!confirm(`تسليم عمولة "${sellerName}" ${period}\n\nعدد الطلبات: ${salesToMark.length}\nقيمة العمولة: ${fmtMoney(totalComm)}\n\nهل تريد تأكيد التسليم؟`)) return;
  // Mark all these sales as commissionPaid
  for(const s of salesToMark){
    await updateDoc(doc(db,'sales',s.id),{
      commissionPaid: true,
      commissionPaidAt: Date.now(),
      commissionPaidBy: currentUser?.email || 'admin',
    });
  }
  logActivity('commissionPaid',{sellerId,sellerName,count:salesToMark.length,amount:totalComm});
  toast(`✅ تم تسليم عمولة ${sellerName}: ${fmtMoney(totalComm)} — ${salesToMark.length} طلب`);
};

  const collectedCash=paidInvoices.reduce((a,inv)=>{

  const thisMonth=new Date().toISOString().slice(0,7);

  const monthRev=monthSales.reduce((a,s)=>a+(s.total||0),0);

};

let storeChatRoomId = null;
let storeChatUnsub = null;
window.openStoreChatWidget = function(){

};

};
window.startStoreChat = async function(){
  const nameInput = document.getElementById('scwName');
  const customerName = (nameInput?.value||'').trim() || 'زائر';
  const nameForm = document.getElementById('scwNameForm');
  const inputArea = document.getElementById('scwInputArea');
  // Create or reuse chat room (use localStorage to persist room id)
  let roomId = localStorage.getItem('store_chat_room');
  if(!roomId){
    const ref = await addDoc(collection(db,'chatRooms'),{
      customerName, createdAt:Date.now(), lastAt:Date.now(),
      lastMessage:'', unread:0, channel:'store',
      sellerId: storeSellerOverride || null,
    });
    roomId = ref.id;
    localStorage.setItem('store_chat_room', roomId);
  }
  storeChatRoomId = roomId;
  if(nameForm) nameForm.style.display='none';
  if(inputArea) inputArea.style.display='flex';
  // Subscribe to messages
  if(storeChatUnsub) storeChatUnsub();
  const {collection:col2,onSnapshot:onSnap2,query:q2,orderBy:ob2} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const q = q2(col2(db,'chatRooms',roomId,'messages'), ob2('timestamp','asc'));
  storeChatUnsub = onSnap2(q, snap=>{
    const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
    const div = document.getElementById('scwMessages');
    if(!div) return;
    div.innerHTML = msgs.map(m=>`
      <div class="scw-msg ${m.role==='admin'?'scw-admin':'scw-customer'}">
        <div class="scw-bubble">${m.text||''}</div>
        <div class="scw-time">${new Date(m.timestamp||0).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>`).join('') || `<div style="text-align:center;color:#888;font-size:13px;padding:20px 0;">ابدأ المحادثة — سنرد قريباً 💬</div>`;
    div.scrollTop = div.scrollHeight;
  });
};
window.sendStoreChatMsg = async function(){
  const input = document.getElementById('scwMsgInput');
  const text = (input?.value||'').trim();
  if(!text || !storeChatRoomId) return;
  input.value = '';
  const ts = Date.now();
  const {collection:col2,addDoc:add2,updateDoc:upd2,doc:doc2,increment:inc2} = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  await add2(col2(db,'chatRooms',storeChatRoomId,'messages'),{
    text, role:'customer', timestamp:ts,
  });
  await upd2(doc2(db,'chatRooms',storeChatRoomId),{
    lastMessage:text, lastAt:ts, unread:inc2(1),
  });
};
window.openChatRoom = async function(roomId){
  activeChatId=roomId;
  render();
  await updateDoc(doc(db,'chatRooms',roomId),{unread:0});
  if(chatUnsub)chatUnsub();
  const {collection:col2,onSnapshot:onSnap2,query:q2,orderBy:ob2}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const q=q2(col2(db,'chatRooms',roomId,'messages'),ob2('timestamp','asc'));
  chatUnsub=onSnap2(q,snap=>{
    const msgs=snap.docs.map(d=>({id:d.id,...d.data()}));
    const div=document.getElementById('chatMessages');
    if(!div)return;
    div.innerHTML=msgs.map(m=>`<div class="chat-msg ${m.role==='admin'?'admin':'customer'}">
      <div>${m.text||''}</div>
      <div class="ts">${new Date(m.timestamp||0).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</div>
    </div>`).join('')||`<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">لا رسائل بعد</div>`;

  });
};

window.sendChatMsg = async function(){
  const input=document.getElementById('chatInput');
  const text=(input?.value||'').trim();
  if(!text||!activeChatId)return;
  input.value='';
  const {collection:col2,addDoc:add2,updateDoc:upd2,doc:doc2,serverTimestamp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const ts=Date.now();
  await add2(col2(db,'chatRooms',activeChatId,'messages'),{

// ============ SELLER HUB — لوحة البائع الشخصية ============
function renderSellerHub(){
  const mySales=data.sales.filter(s=>s.sellerId===currentSellerId);
  const myCompleted=mySales.filter(s=>isCompleted(s.status)||isDelivered(s.status));
  const myTotal=mySales.reduce((a,s)=>a+(s.total||0),0);
  const myProfit=mySales.reduce((a,s)=>{
    return a+(s.items||[]).reduce((sa,it)=>{
      const p=data.products.find(x=>x.id===it.productId);
      return sa+((p?.price||0)-(p?.cost||0))*it.qty;
    },0);
  },0);
  const seller=data.sellers.find(x=>x.id===currentSellerId)||{name:currentUser?.email||'—'};
  const commPct=seller.commission||5;
  const myComm=myTotal*commPct/100;
  const myCustomers=[...new Set(mySales.map(s=>s.customerId))].length;
  return `
  <div style="background:linear-gradient(135deg,var(--navy-800),var(--navy-600));color:#fff;padding:28px;border-radius:var(--radius);margin-bottom:20px;">

  </div>
  <div class="stats" style="margin-bottom:20px;">

    <div class="stat"><div class="label">طلبات مكتملة</div><div class="value" style="color:var(--success);">${myCompleted.length}</div></div>
    <div class="stat"><div class="label">عملائي</div><div class="value">${myCustomers}</div></div>
    <div class="stat"><div class="label">ربحي الإجمالي</div><div class="value" style="color:var(--navy-700);">${fmtMoney(myProfit)}</div></div>
    <div class="stat"><div class="label">عمولتي (${commPct}%)</div><div class="value" style="color:var(--warning);">${fmtMoney(myComm)}</div></div>
  </div>
  <div class="card">
    <div style="padding:14px 18px;border-bottom:1px solid var(--border);"><h3 style="font-size:15px;">آخر مبيعاتي</h3></div>
    <div class="table-wrap"><table>
      <thead><tr><th>${t('no')}</th><th>${t('customer')}</th><th>${t('qtyTotal')}</th><th>${t('total')}</th><th>${t('date')}</th><th>${t('status')}</th></tr></thead>
      <tbody>${[...mySales].reverse().slice(0,20).map(s=>{
        const c=data.customers.find(x=>x.id===s.customerId);
        const totalQty=(s.items||[]).reduce((a,i)=>a+i.qty,0);
        return `<tr>
          <td>#${s.id.slice(0,5)}</td>
          <td>${c?.name||'—'}</td>
          <td>${totalQty}</td>
          <td><strong>${fmtMoney(s.total)}</strong></td>
          <td>${fmtDate(s.date)}</td>
          <td><span class="badge ${statusBadgeCls(s.status)}">${s.status}</span></td>
        </tr>`;
      }).join('')||`<tr><td colspan="6" class="empty">${t('noSales')}</td></tr>`}
      </tbody>
    </table></div>
  </div>`;
}

// ============ MODAL / TOAST / PWA ============
window.showModal = function(html, size){
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal').className = 'modal' + (size==='lg'?' lg':'');
  document.getElementById('modalBg').classList.add('open');
  setTimeout(refreshImagePreview, 10);
};
window.closeModal = function(){ document.getElementById('modalBg').classList.remove('open'); };
document.getElementById('modalBg').addEventListener('click', e => { if (e.target.id === 'modalBg') closeModal(); });

let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}
window.toast = toast;

if ('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW failed:', err));
  });
}

applyLang();
